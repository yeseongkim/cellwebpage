<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | CELL</title>
  <style>
    body {
      margin: 0;
      font-family: "Open Sans", Arial, sans-serif;
      background: #f7fbff;
      color: #16324f;
      display: grid;
      min-height: 100vh;
      place-items: center;
    }
    main {
      text-align: center;
      padding: 24px;
      max-width: 640px;
    }
    h1 {
      font-size: 2rem;
      margin: 0 0 12px;
    }
    p {
      margin: 0 0 20px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      text-decoration: none;
      background: #0074da;
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>404 - Page Not Found</h1>
    <p>The page you requested does not exist or has moved.</p>
    <a href="/">Back To Home</a>
  </main>
</body>
</html>
